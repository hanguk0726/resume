  <noscript><main><h1>HanGuk Shin</h1>
<p>I started from media (image, video, audio) processing and editor apps. What draws me is solving problems in software and taming complexity; lately I've focused on the distributed-systems problem of making a system converge to a correct state even when commands and signals get lost. I enjoy mobile engineering and am at home with Android native, while increasingly working across the stack — from cross-platform React Native apps to the backend that has to stay correct even when commands and signals get lost.</p>
<p>Email: <a href="mailto:hanguk0726@gmail.com">hanguk0726@gmail.com</a> · GitHub: <a href="https://www.github.com/hanguk0726">https://www.github.com/hanguk0726</a></p>
<h2>Projects</h2>
<section><h3>REVITA (2025.10 – Present, Company)</h3>
<p><strong>Outdoor Computer Vision IoT Project</strong></p>
<p>Tech: React Native, Expo, TypeScript, Next.js, OpenCV, Pannellum, MQTT, PostgreSQL, Airflow, Python</p>
<p>Keywords: ComputerVision, IoT, DistributedSystems, MQTT, LoRa, Pannellum, OpenCV, Observability, OTA, BackOffice, Automation</p>
<p>Joined as a product engineer on an outdoor computer vision IoT project, building mobile apps (Android, iOS), public-facing websites, the back-office, and the backend that controls field hardware — all from scratch.</p>
<p>Reduced panorama image generation time from over 15 minutes to 2 minutes with OpenCV, switching from image-based stitching to video-based scanning. Integrated the Pannellum web library into mobile with custom logic — dynamic tile requests by zoom level and coordinate markers for precise shooting — for immersive on-site panorama viewing.</p>
<p>Building the irrigation system that opens and closes valves planted out in the field turned a deceptively simple feature into a distributed-systems problem. Devices talk over MQTT (QoS 2) and LoRa, where commands can be lost in transit, so I modeled each session as a finite state machine that separates "what the server believes" from "whether the valve is physically open." States stay honestly pending until an ACK/NOTIFY arrives, and the hardware's self-reported state is always the source of truth.</p>
<p>Stability came not from perfect commands but from a structure that converges even when things drift. A per-minute monitor nudges stuck sessions back toward correctness, and every stalled state has a timeout. A ghost session that never closed — blocked by the one-active-session-per-valve unique constraint and stalling the next watering — was fixed not by weakening that protective constraint but by tightening the latency of an existing safety sweep. Multi-zone scheduled watering uses Make-Before-Break (open the next valve before closing the current one) to avoid deadheading a shared pump, with idempotent CAS-based pump start. Sensor-triggered conditional watering is wrapped in layered guardrails — daily caps, cooldowns, rain skips, and a pre-fire notification. The orchestrator is swappable (Airflow in operation, Temporal under evaluation) while the database stays the single source of truth.</p>
<p>In the back-office, automated repetitive content generation such as GeoTIFF raster overlays and consulting articles. To overcome a small team's resource limits, led the back-office initiative to automate workflows and lower barriers, turning individual-dependent repetitive tasks into shared workflows — reducing communication cost and raising both team efficiency and output quality.</p>
<p>On the operations side, shipped a cross-platform app (migrated to MapLibre native maps) through staged OTA releases on EAS and built level-tiered Sentry observability. Traced production issues to their root cause rather than the symptom, verified fixes on real devices, and added regression guardrails (lint rules, outlier validation) to structurally prevent recurrence.</p>

</section>

<section><h3>Android Video Editor (2025.02 – 2025.06, Company)</h3>
<p><strong>Android Video Editor with OpenGL</strong></p>
<p>Tech: Android, OpenGL</p>
<p>Keywords: Android, VideoEditor, Opengl</p>
<p>I built a video editor by combining OpenGL and Android's MediaCodec for decoding, rendering, and encoding. Using EGL, I sent OpenGL frames directly to the encoder, which made the process more efficient by skipping YUV conversion.</p>
<p>Trying to process text and multiple video sources, and for audio, I converted PCM to AAC and added it to the final video. I used tools like FBOs, shaders, and timeline control to build the needed features and manage the rendering process properly.</p>
<p>You can read more about the full process in the link. (In Korean and English versions)</p>

<section><h3>Phylaxis Proxy (2023.10 – 2024.01, Company)</h3>
<p><strong>Reverse proxy for network security and resource management</strong></p>
<p>Tech: go, aerospike, clickhouse, kafka, haproxy, docker</p>
<p>Keywords: WAF, RateLimit, DDos, Cache, ReverseProxy, SEO, ACME, Logger, SQLi, XSS, JA3-Fingerprint</p>
<p>This is a reverse proxy like Cloudflare. It's a CDN/WAF service that defends against attacks on host domains with various settings and assists with resource management. It was a challenging task, but I was able to develop it with excellent colleagues.</p>
<p>I focused on the RateLimit, Cache, and SEO parts. For RateLimit and Cache, I developed LRU management between RAM and disk, ttl management, request header parsing, and compression and caching through experience with image processing like 'Avatar Vision'.</p>
<p>I handled log and statistic processing with Clickhouse and Kafka, query and body parsing for defense against SQLi and XSS, authentication with Haproxy, fingerprinting, and load balancing, Docker packaging and deployment, and applying settings for other features like WAF, DDOS, and cache rules.</p>
<p>Through this project, I was able to learn sensitivity to computing resources through the flow of filtered and processed network requests and the themes of attack and defense. I also rediscovered the joy of intuitive programming in Golang, which I had forgotten.</p>
<p><a href="https://phylaxis.net/">https://phylaxis.net/</a></p>
</section>

<section><h3>Togispace (2022.01 – 2023.02, Company)</h3>
<p><strong>A commercial app for diet and food</strong></p>
<p>Tech: kotlin</p>

<p>I developed and ran this project from scratch as an Android developer for fourteen months. During the fast-paced development process, the app went through multiple changes, including several significant pivots.</p>
<p>I believe the app covered a wide range of topics of Jetpack Compose and Android app development. The app included various components like a calendar, cropper, swipe widget like tinder, drag and drop functionality, and other complex widgets with nested scrolling and tabs, among others. The architecture followed clean architecture principles, utilized event-driven systems, and incorporated reactive programming.</p>
<p>I cached network data and images for performance optimization. Additionally, the app supported internationalization, webview integration, camera functionality, PDF handling, a multi-module system, authentication, and more.</p>
<p>At that time, I really enjoyed working with Jetpack Compose and Android development. I continuously focused on enhancing the app's state management, drawing inspiration from TCA (The Composable Architecture) used in iOS development and the latest Android resources. This project allowed me to experience the entire product lifecycle while collaborating with other role groups at a company level. check out the app on the Play Store using the link below.</p>
